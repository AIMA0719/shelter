# Shelter — local development / staging stack
#
# Usage:
#   docker compose up -d
#
# DB schema is applied automatically on first init (schema.sql is mounted into
# the postgis /docker-entrypoint-initdb.d). After the stack is up, ingest data:
#   python -m app.db.ingest --dsn postgresql://shelter:shelter@localhost:5432/shelter \
#       --buildings data/<area>_buildings.geojson --pois data/sample_pois.geojson

version: "3.9"

services:

  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: shelter
      POSTGRES_PASSWORD: shelter
      POSTGRES_DB: shelter
    volumes:
      - postgis_data:/var/lib/postgresql/data
      # 최초 init 시 스키마 자동 적용(빈 데이터 디렉터리일 때만 실행됨)
      - ./backend/app/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shelter -d shelter"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      SHELTER_DB_DSN: postgresql://shelter:shelter@postgis:5432/shelter
      # Optional — pass from host env if set, otherwise empty string (feature disabled).
      SHELTER_KMA_SERVICE_KEY: ${SHELTER_KMA_SERVICE_KEY:-}
      SHELTER_WALK_NETWORK_GEOJSON: ${SHELTER_WALK_NETWORK_GEOJSON:-}
    ports:
      - "8000:8000"

volumes:
  postgis_data:
